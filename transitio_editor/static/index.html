<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>transitio editor</title>
<link rel="stylesheet" href="/static/vendor/maplibre-gl.css">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="sidebar">
  <h1>transitio</h1>
  <div id="summary" class="panel"></div>

  <div class="panel">
    <div class="mode-row">
      <button id="mode-select" class="mode active">Select</button>
      <button id="mode-add-stop" class="mode">Add stop</button>
      <button id="mode-draw" class="mode">Draw shape</button>
    </div>
    <label id="snap-row" class="hidden">
      <input type="checkbox" id="snap-toggle" checked> snap to streets
    </label>
    <div id="draw-actions" class="hidden">
      <button id="finish-shape">Finish shape</button>
      <button id="cancel-shape">Cancel</button>
    </div>
  </div>

  <div id="inspector" class="panel hidden"></div>

  <details class="panel"><summary>New route</summary>
    <form id="route-form">
      <input name="route_id" placeholder="route_id" required>
      <input name="route_short_name" placeholder="short name" required>
      <select name="route_type">
        <option value="0">tram</option><option value="1">subway</option>
        <option value="2">rail</option><option value="3" selected>bus</option>
        <option value="4">ferry</option>
      </select>
      <input name="agency_id" placeholder="agency_id (optional)">
      <button>Add route</button>
    </form>
  </details>

  <details class="panel"><summary>New frequency trip</summary>
    <form id="trip-form">
      <input name="route_id" placeholder="route_id" required>
      <input name="service_id" placeholder="service_id" required>
      <input name="trip_id" placeholder="trip_id" required>
      <input name="shape_id" placeholder="shape_id (optional)">
      <input name="start" value="06:00:00" required>
      <input name="end" value="22:00:00" required>
      <input name="headway" type="number" value="600" required>
      <p class="hint">Click stops on the map in visit order:</p>
      <ol id="trip-stops"></ol>
      <button type="button" id="clear-trip-stops">Clear stops</button>
      <button>Add trip</button>
    </form>
  </details>

  <details class="panel"><summary>New agency / service</summary>
    <form id="agency-form">
      <input name="agency_id" placeholder="agency_id" required>
      <input name="agency_name" placeholder="name" required>
      <input name="agency_url" placeholder="https://…" required>
      <input name="agency_timezone" placeholder="Europe/Helsinki" required>
      <button>Add agency</button>
    </form>
    <form id="service-form">
      <input name="service_id" placeholder="service_id" required>
      <select name="days">
        <option>daily</option><option>weekdays</option><option>weekend</option>
      </select>
      <input name="start_date" value="20260101" required>
      <input name="end_date" value="20261231" required>
      <button>Add service</button>
    </form>
  </details>

  <div class="panel">
    <button id="save" class="primary">Save &amp; validate</button>
    <div id="save-result"></div>
  </div>
  <div id="status"></div>
</div>
<div id="map"></div>
<script src="/static/vendor/maplibre-gl.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
