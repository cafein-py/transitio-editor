name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install black flake8 flake8-bugbear
      - run: black --check transitio_editor tests
      - run: flake8 transitio_editor tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
        working-directory: frontend
      # The built assets under transitio_editor/static are committed (so
      # the wheel needs no Node); this rebuilds from source to confirm it
      # still compiles.
      - run: npm run build
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[snap,notebook]" pytest
      - run: pytest tests/ -v
